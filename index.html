<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Aniversário do Rafael - 5 Anos 🚀</title>
<meta name="description" content="Você está convidado para o aniversário do Rafael!">
<meta property="og:image" content="https://benignobjunior.github.io/rafa5anos/assets/og-preview.jpg">
<meta property="og:image:type" content="image/jpeg">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="628">
<meta property="og:title" content="Aniversário do Rafael - 5 Anos">
<meta property="og:description" content="É com muita alegria que vocês estão sendo convidados para o aniversário do nosso aventureiro Rafael. Será uma tarde inesquecível e para isso acontecer sua presença é indispensável! 🚀🤠 CLIQUE NO LINK PARA ACESSAR O CONVITE 💌">
<meta property="og:url" content="https://benignobjunior.github.io/rafa5anos/">
<meta property="og:type" content="website">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:system-ui,-apple-system,sans-serif}

.canvas{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  max-width:100vw;max-height:100vh;aspect-ratio:1080/1850;
}
@supports(height:100dvh){.canvas{max-height:100dvh}}
@media(max-aspect-ratio:1080/1850){.canvas{width:100vw;height:auto}}
@media(min-aspect-ratio:1080/1850){.canvas{height:100vh;width:auto}@supports(height:100dvh){.canvas{height:100dvh}}}

#capa{
  position:fixed;inset:0;z-index:100;background:#000;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;overflow:hidden;
}
#capa .canvas img{
  position:absolute;inset:0;width:100%!important;height:100%!important;
  object-fit:contain;object-position:center;user-select:none;-webkit-user-drag:none;
}
#capa .tap-overlay{
  position:absolute;inset:0;z-index:10;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
  padding-bottom:6%;gap:0.8rem;
}
#capa .tap-text{
  color:#fff;font-size:clamp(0.8rem,3vw,1.1rem);font-weight:500;
  background:rgba(0,0,0,0.5);padding:0.6rem 1.5rem;border-radius:30px;
  backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,0.2);
  animation:pulse 2s infinite;
}
#countdown-capa{
  color:#ffd700;font-size:clamp(0.7rem,2.5vw,0.95rem);font-weight:700;
  background:rgba(0,0,0,0.6);padding:0.4rem 1.2rem;border-radius:20px;
  backdrop-filter:blur(6px);border:1px solid rgba(255,215,0,0.3);
  letter-spacing:0.5px;
}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.7;transform:scale(0.97)}}
.sparkle{position:absolute;width:4px;height:4px;background:#ffd700;border-radius:50%;pointer-events:none;opacity:0;z-index:5}

#loading{
  position:fixed;inset:0;z-index:150;background:#000;
  display:none;align-items:center;justify-content:center;flex-direction:column;gap:1.5rem;
}
#loading .spinner{
  width:48px;height:48px;border:3px solid rgba(255,215,0,0.2);
  border-top-color:#ffd700;border-radius:50%;animation:spin 0.8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{color:#fff;font-size:0.9rem;opacity:0.7}

#videoContainer{
  position:fixed;inset:0;z-index:50;background:#000;
  display:none;overflow:hidden;
}
#videoContainer .canvas video{
  position:absolute;inset:0;width:100%!important;height:100%!important;
  object-fit:contain;object-position:center;pointer-events:none;
}

#botoes{position:absolute;inset:0;z-index:60;pointer-events:none}
#botoes a{
  position:absolute;display:block;pointer-events:auto;
  background:transparent;border:0;cursor:pointer;
  -webkit-tap-highlight-color:transparent;transition:transform 0.15s;
  opacity:0;transform:scale(0);
}
#botoes a:active{transform:scale(0.9)!important}
#botoes a:nth-child(1){left:25.5%;top:62.7%;width:10.2%;height:10%}
#botoes a:nth-child(2){left:37.6%;top:62.6%;width:11.9%;height:10%}
#botoes a:nth-child(3){left:50.9%;top:62.6%;width:12%;height:10%}

#botoes a::before,#botoes a::after{
  content:'';position:absolute;inset:-6px;border-radius:16px;
  border:2px solid rgba(255,255,255,0.9);opacity:0;pointer-events:none;
}
#botoes.show a::before{animation:ripple 1.4s ease-out infinite}
#botoes.show a::after{animation:ripple 1.4s ease-out 0.7s infinite}
@keyframes ripple{0%{transform:scale(0.9);opacity:0.8}100%{transform:scale(1.5);opacity:0}}
#botoes.show a{
  background:radial-gradient(ellipse at center,rgba(255,255,255,0.25) 0%,transparent 70%);
  box-shadow:0 0 20px rgba(255,255,255,0.6),0 0 45px rgba(255,255,255,0.3);
  animation:breathe 1.8s ease-in-out infinite,bounce 1s ease-in-out infinite;
}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes breathe{
  0%,100%{box-shadow:0 0 20px rgba(255,255,255,0.6),0 0 45px rgba(255,255,255,0.3)}
  50%{box-shadow:0 0 35px rgba(255,255,255,0.9),0 0 70px rgba(255,255,255,0.4)}
}

  position:absolute;bottom:12%;left:50%;transform:translateX(-50%);
  z-index:70;pointer-events:none;opacity:0;
  color:#fff;font-size:clamp(0.75rem,2.5vw,1rem);font-weight:600;
  background:rgba(0,0,0,0.6);padding:0.5rem 1.2rem;border-radius:20px;
  backdrop-filter:blur(6px);border:1px solid rgba(255,215,0,0.3);
  white-space:nowrap;
}

#overlay{
  position:fixed;inset:0;z-index:200;
  display:none;align-items:center;justify-content:center;
  background:rgba(0,0,0,0.85);backdrop-filter:blur(16px);
}
#overlay img{max-width:92vw;max-height:92vh;object-fit:contain;border-radius:8px;box-shadow:0 20px 80px rgba(0,0,0,0.6)}
#overlay .close{
  position:absolute;top:max(env(safe-area-inset-top,16px),16px);
  right:max(env(safe-area-inset-right,16px),16px);
  width:48px;height:48px;background:rgba(255,255,255,0.9);
  border:none;border-radius:50%;font-size:24px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(0,0,0,0.3);transition:transform 0.2s;
}
#overlay .close:hover{transform:scale(1.1)}

#audioBtn{
  position:fixed;bottom:max(env(safe-area-inset-bottom,16px),16px);
  right:16px;z-index:300;width:44px;height:44px;
  background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);
  border-radius:50%;color:#fff;font-size:1.2rem;cursor:pointer;
  backdrop-filter:blur(8px);display:none;transition:transform 0.2s;
}
#audioBtn:hover{transform:scale(1.1)}

#confetti{position:fixed;inset:0;z-index:90;pointer-events:none}

/* Explosion particles */
.explosion{position:fixed;inset:0;z-index:110;pointer-events:none}
.exp-particle{position:absolute;border-radius:50%;pointer-events:none}
</style>
</head>
<body>

<div id="capa">
  <div class="canvas">
    <img src="assets/capa.png" alt="Convite Rafael 5 Anos" decoding="async">
  </div>
  <div class="tap-overlay">
    <div id="countdown-capa"></div>
    <span class="tap-text">✨ Toque para abrir ✨</span>
  </div>
</div>

<div id="loading">
  <div class="spinner"></div>
  <p>Preparando o convite...</p>
</div>

<div id="videoContainer">
  <div class="canvas">
    <video id="video" playsinline webkit-playsinline preload="auto">
      <source src="assets/video.mov" type="video/mp4">
    </video>
    <div id="botoes">
      <a href="https://forms.gle/nzumWp6gqjV2jWRC7" target="_blank" rel="noopener" aria-label="Confirmar presença"></a>
      <a href="https://maps.app.goo.gl/kCy7yiGR1m813gJN6" target="_blank" rel="noopener" aria-label="Ver no mapa"></a>
      <a href="#" id="btnImagem" aria-label="Ver convite"></a>
    </div>
  </div>
</div>

<div id="overlay">
  <button class="close" aria-label="Fechar">×</button>
  <img src="assets/convite.png" alt="Convite completo" decoding="async">
</div>

<button id="audioBtn" aria-label="Controlar música">🔊</button>
<canvas id="confetti"></canvas>
<div class="explosion" id="explosion"></div>

<script>
const musica=new Audio('assets/musica.aac');
musica.loop=true;musica.volume=0;let musicaAtiva=true;

// === COUNTDOWN NA CAPA ===
function updateCapaCountdown(){
  const t=new Date('2026-07-05T13:00:00-03:00')-new Date();
  const el=document.getElementById('countdown-capa');
  if(t<=0){el.textContent='🎉 É HOJE! 🎉';return}
  const d=Math.floor(t/864e5),h=Math.floor(t%864e5/36e5),m=Math.floor(t%36e5/6e4);
  el.textContent=`⏰ Faltam ${d} dias, ${h}h e ${m}min!`;
}
updateCapaCountdown();setInterval(updateCapaCountdown,60000);

// === SPARKLES ===
(function(){
  for(let i=0;i<25;i++){
    const s=document.createElement('div');s.className='sparkle';
    s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';
    capa.querySelector('.canvas').appendChild(s);
    gsap.to(s,{opacity:1,scale:2,duration:0.6,repeat:-1,yoyo:true,delay:Math.random()*3,ease:'power1.inOut'});
    gsap.to(s,{x:()=>(Math.random()-0.5)*40,y:()=>(Math.random()-0.5)*40,duration:3+Math.random()*2,repeat:-1,yoyo:true,ease:'sine.inOut'});
  }
})();

// Preload
video.preload='auto';video.muted=true;
video.play().then(()=>{video.pause();video.currentTime=0}).catch(()=>{});

// === ABRIR ===
capa.addEventListener('click',async()=>{
  try{const AC=window.AudioContext||window.webkitAudioContext;if(AC){const ctx=new AC();await ctx.resume()}}catch(_){}

  // Vibração tátil
  if(navigator.vibrate)navigator.vibrate([50,30,100]);

  // Explosão de partículas da capa
  explodeParticles();

  const tl=gsap.timeline();
  tl.to('.tap-text',{opacity:0,y:20,duration:0.2})
    .to('#countdown-capa',{opacity:0,y:20,duration:0.2},'<')
    .to('.sparkle',{scale:4,opacity:0,duration:0.5,stagger:0.01,ease:'power2.out'},'<')
    .to('#capa .canvas img',{scale:1.2,duration:0.6,ease:'power2.in'},'<0.1')
    .to(capa,{opacity:0,duration:0.4,onComplete:()=>{
      capa.style.display='none';
      startVideo();
    }},'<0.3');
});

// === EXPLOSÃO DE PARTÍCULAS NA TRANSIÇÃO ===
function explodeParticles(){
  const colors=['#ffd700','#ff9800','#e53935','#4caf50','#2196f3','#9c27b0','#fff'];
  for(let i=0;i<40;i++){
    const p=document.createElement('div');
    p.className='exp-particle';
    const size=Math.random()*8+4;
    p.style.cssText=`width:${size}px;height:${size}px;background:${colors[i%colors.length]};left:50%;top:50%;`;
    explosion.appendChild(p);
    const angle=Math.random()*Math.PI*2;
    const dist=Math.random()*Math.max(innerWidth,innerHeight)*0.7;
    gsap.to(p,{
      x:Math.cos(angle)*dist,y:Math.sin(angle)*dist,
      opacity:0,scale:0,duration:1+Math.random()*0.5,
      ease:'power2.out',
      onComplete:()=>p.remove()
    });
  }
}

async function startVideo(){
  const ready=video.readyState>=3;
  if(!ready){
    loading.style.display='flex';
    await new Promise(r=>{video.addEventListener('canplay',r,{once:true});setTimeout(r,8000)});
    gsap.to(loading,{opacity:0,duration:0.3,onComplete:()=>loading.style.display='none'});
  }

  videoContainer.style.display='block';
  video.muted=false;video.currentTime=0;

  try{await video.play()}catch{
    video.muted=true;
    try{await video.play()}catch(_){video.currentTime=video.duration||0;showButtons()}
  }

  launchConfetti();

  try{await musica.play();gsap.to(musica,{volume:0.7,duration:3,ease:'power1.in'})}
  catch{musica.muted=true;musica.play().catch(()=>{})}
  audioBtn.style.display='block';gsap.from(audioBtn,{scale:0,duration:0.5,delay:1,ease:'back.out(2)'});

  const showAfterVideo=()=>showButtons();
  video.addEventListener('ended',showAfterVideo,{once:true});
  video.addEventListener('pause',()=>{if(video.currentTime>0)showAfterVideo()},{once:true});
  setTimeout(showAfterVideo,15000);
}

function showButtons(){
  if(botoes.classList.contains('show'))return;

  // Vibração ao mostrar botões
  if(navigator.vibrate)navigator.vibrate([30,20,30]);

  // Segundo confetti!
  launchConfetti();

  const btns=botoes.querySelectorAll('a');
  gsap.to(btns,{
    opacity:1,scale:1,duration:0.7,stagger:0.2,
    ease:'elastic.out(1.2,0.4)',
    onComplete:()=>{
      botoes.classList.add('show');
    }
  });
}

// === SHAKE EASTER EGG ===
let lastShake=0;
if(window.DeviceMotionEvent){
  window.addEventListener('devicemotion',e=>{
    const a=e.accelerationIncludingGravity;
    if(!a)return;
    const force=Math.abs(a.x)+Math.abs(a.y)+Math.abs(a.z);
    if(force>35&&Date.now()-lastShake>2000){
      lastShake=Date.now();
      if(navigator.vibrate)navigator.vibrate(100);
      launchConfetti();
    }
  });
}

// Audio
audioBtn.addEventListener('click',()=>{
  if(musicaAtiva){musica.volume=0;audioBtn.textContent='🔇'}
  else{gsap.to(musica,{volume:0.7,duration:0.5});audioBtn.textContent='🔊'}
  musicaAtiva=!musicaAtiva;
});

// Overlay
document.getElementById('btnImagem').addEventListener('click',(e)=>{
  e.preventDefault();overlay.style.display='flex';
  gsap.from(overlay,{opacity:0,duration:0.3});
  gsap.from(overlay.querySelector('img'),{scale:0.9,opacity:0,duration:0.4,ease:'back.out(1.5)'});
});
overlay.querySelector('.close').addEventListener('click',()=>{
  gsap.to(overlay,{opacity:0,duration:0.2,onComplete:()=>{overlay.style.display='none';overlay.style.opacity=1}});
});
overlay.addEventListener('click',(e)=>{if(e.target===overlay)overlay.querySelector('.close').click()});

// === CONFETTI ===
function launchConfetti(){
  const c=document.getElementById('confetti'),ctx=c.getContext('2d');
  c.width=innerWidth;c.height=innerHeight;
  const colors=['#ffd700','#e53935','#4caf50','#2196f3','#ff9800','#9c27b0','#00bcd4','#ff5722'],P=[];
  for(let i=0;i<200;i++){
    const angle=(Math.random()-0.5)*Math.PI;
    P.push({x:c.width*0.5+(Math.random()-0.5)*c.width*0.2,y:c.height*0.5,
      vx:Math.cos(angle)*(Math.random()*14+6),vy:Math.sin(angle)*(Math.random()*14+6)-12,
      color:colors[i%colors.length],w:Math.random()*10+4,h:Math.random()*6+3,
      rot:Math.random()*360,rv:(Math.random()-0.5)*15,life:1});
  }
  let f=0;
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);let alive=false;
    P.forEach(p=>{p.vy+=0.4;p.x+=p.vx;p.y+=p.vy;p.vx*=0.985;p.rot+=p.rv;p.life-=0.002;
      if(p.life>0&&p.y<c.height+50){alive=true;ctx.save();ctx.globalAlpha=p.life;
        ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);
        ctx.fillStyle=p.color;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore()}});
    f++;if(alive&&f<400)requestAnimationFrame(draw);else ctx.clearRect(0,0,c.width,c.height);
  }
  draw();
}

document.addEventListener('contextmenu',e=>e.preventDefault());
</script>
</body>
</html>
